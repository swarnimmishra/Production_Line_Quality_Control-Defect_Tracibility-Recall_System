<style>
    .admin-page-container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        padding: 2rem 0;
        animation: fadeIn 0.4s ease-out forwards;
    }

    .main-admin-heading {
        color: var(--secondary, #0f172a);
        font-size: 2.25rem;
        font-weight: 700;
        margin: 0 0 2.5rem 0;
        text-align: center;
        letter-spacing: -0.02em;
    }

    .admin-wrapper {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
        gap: 2rem;
        width: 100%;
        max-width: 900px;
    }

    .admin-container {
        background: var(--white, #ffffff);
        padding: 2.5rem;
        border-radius: var(--radius-lg, 1rem);
        box-shadow: var(--shadow-md, 0 4px 6px -1px rgb(0 0 0 / 0.1));
        border: 1px solid var(--border, #e2e8f0);
        display: flex;
        flex-direction: column;
        transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .admin-container:hover {
        transform: translateY(-4px);
        box-shadow: var(--shadow-lg, 0 20px 25px -5px rgb(0 0 0 / 0.1));
    }

    .admin-container h2 {
        margin-bottom: 0.25rem;
        color: var(--secondary, #0f172a);
        text-align: center;
        font-size: 1.5rem;
        font-weight: 600;
    }

    .admin-container p.sub {
        color: var(--text-muted, #64748b);
        font-size: 0.95rem;
        margin-bottom: 2rem;
        text-align: center;
    }

    .admin-container form {
        display: flex;
        flex-direction: column;
        flex-grow: 1;
    }

    .admin-container input {
        width: 100%;
        padding: 0.75rem 1rem;
        margin-bottom: 1.25rem;
        border: 1px solid var(--border, #e2e8f0);
        border-radius: var(--radius-md, 0.5rem);
        background: var(--bg-light, #f8fafc);
        color: var(--text-main, #334155);
        font-size: 0.95rem;
        outline: none;
        transition: all 0.2s ease-in-out;
        box-sizing: border-box;
        font-family: inherit;
    }

    .admin-container input:focus {
        border-color: var(--primary, #4338ca);
        background: var(--white, #ffffff);
        box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
    }

    .input-label {
        text-align: left;
        margin-bottom: 0.5rem;
        color: var(--text-main, #334155);
        font-size: 0.85rem;
        font-weight: 500;
    }

    .admin-container .btn {
        width: 100%;
        padding: 0.875rem 1.5rem;
        background: var(--primary, #4338ca);
        color: white;
        border: none;
        border-radius: var(--radius-md, 0.5rem);
        cursor: pointer;
        font-size: 1rem;
        font-weight: 600;
        transition: all 0.2s ease-in-out;
        margin-top: auto;
    }

    .admin-container .btn:hover {
        background: var(--primary-hover, #3730a3);
        transform: translateY(-1px);
        box-shadow: var(--shadow-sm);
    }

    @keyframes fadeIn {
        from {
            opacity: 0;
            transform: translateY(15px);
        }

        to {
            opacity: 1;
            transform: translateY(0);
        }
    }
</style>

<div class="admin-page-container">
    <h1 class="main-admin-heading">Admin Control Panel</h1>

    <div class="admin-wrapper">
        <div class="admin-container" id="admin-panel-machine">
            <h2>Add Machine</h2>
            <p class="sub">Register new equipment to the floor</p>
            <form id="machine-form">
                <input type="number" id="machine-id" placeholder="Machine ID" required>
                <input type="text" id="machine-name" placeholder="Machine Name" required>
                <input type="text" id="machine-type" placeholder="Machine Type" required>
                <div class="input-label">Last Maintenance:</div>
                <input type="date" id="last-maintenance" required>
                <button type="submit" class="btn">Register Machine</button>
            </form>
        </div>

        <div class="admin-container" id="admin-panel-product">
            <h2>Add Product</h2>
            <p class="sub">Register new product SKUs for tracking</p>
            <form id="product-form">
                <input type="number" id="product-id" placeholder="Product ID" required>
                <input type="text" id="product-name" placeholder="Product Name" required>
                <input type="text" id="product-sku" placeholder="Product SKU" required>
                <button type="submit" class="btn">Register Product</button>
            </form>
        </div>
    </div>
</div>

<script>
    // Safely attach to window to prevent redeclaration crashes
    window.notify = window.notify || function (msg, type = 'info') {
        if (typeof window.showNotification === 'function') {
            window.showNotification(msg, type);
        } else {
            alert(msg);
        }
    };

    document.getElementById('machine-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Registering...';
        btn.style.opacity = '0.8';

        const machine_id = document.getElementById('machine-id').value;
        const machine_name = document.getElementById('machine-name').value;
        const machine_type = document.getElementById('machine-type').value;
        const last_maintenance = document.getElementById('last-maintenance').value;

        const res = await fetch('/api/admin/machines', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ machine_id, machine_name, machine_type, last_maintenance })
        });
        const data = await res.json();

        if(res.ok) {
            setTimeout(() => {
                            window.notify('Machine registered successfully.', 'success');
                            this.reset();
                            btn.innerText = originalText;
                            btn.style.opacity = '1';
                        }, 800);
        } 
        else {
            window.notify('Connection error. Please try again.', 'error');
            btn.innerText = originalText;
            btn.style.opacity = '1';
        }
        
    });

    document.getElementById('product-form').addEventListener('submit', async function (e) {
        e.preventDefault();
        const btn = this.querySelector('button');
        const originalText = btn.innerText;
        btn.innerText = 'Registering...';
        btn.style.opacity = '0.8';

        const product_id = document.getElementById('product-id').value;
        const product_name = document.getElementById('product-name').value;
        const product_sku = document.getElementById('product-sku').value;

        const res = await fetch('/api/admin/products', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ product_id, product_name, product_sku })
        });
        const data = await res.json();
        if(res.ok) {
            setTimeout(() => {
                window.notify('Product SKU registered successfully.', 'success');
                this.reset();
                btn.innerText = originalText;
                btn.style.opacity = '1';
            }, 800);
        }
        else {
            window.notify('Connection error. Please try again.', 'error');
            btn.innerText = originalText;
            btn.style.opacity = '1';
        }

    });
</script>
