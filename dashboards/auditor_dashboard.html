<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Audit Logs - ProAuto</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4338ca;
            --primary-hover: #3730a3;
            --secondary: #0f172a;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #22c55e;
            --warning: #f59e0b;
            --text-main: #334155;
            --text-muted: #64748b;
            --bg-light: #f8fafc;
            --white: #ffffff;
            --border: #e2e8f0;
            --shadow-sm: 0 1px 2px 0 rgb(0 0 0 / 0.05);
            --shadow-md: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --shadow-lg: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            --radius-md: 0.5rem;
            --radius-lg: 1rem;
            --transition: all 0.2s ease-in-out;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        body {
            min-height: 100vh;
            background: var(--bg-light);
            padding: 100px 20px 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* Navigation Header */
        .dashboard-header {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 70px;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 5%;
            z-index: 1000;
            box-shadow: var(--shadow-sm);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--secondary);
            display: flex;
            align-items: center;
            gap: 0.75rem;
            text-decoration: none;
        }

        .logo::before {
            content: '';
            display: inline-block;
            width: 24px;
            height: 24px;
            background: var(--primary);
            border-radius: 6px;
        }

        .header-actions {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .user-info {
            font-size: 0.9rem;
            font-weight: 500;
            color: var(--text-muted);
        }

        .logout-btn {
            background: var(--danger);
            color: var(--white);
            border: none;
            padding: 0.5rem 1.25rem;
            border-radius: var(--radius-md);
            font-weight: 600;
            font-size: 0.9rem;
            cursor: pointer;
            transition: var(--transition);
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .logout-btn:hover {
            background: var(--danger-hover);
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
        }

        /* Main Container */
        .main-layout {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .dashboard-container {
            background: var(--white);
            padding: 2.5rem;
            border-radius: var(--radius-lg);
            box-shadow: var(--shadow-md);
            border: 1px solid var(--border);
            width: 100%;
        }

        /* Typography */
        .section-title {
            color: var(--secondary);
            font-size: 1.5rem;
            font-weight: 700;
            margin-bottom: 0.25rem;
            letter-spacing: -0.02em;
        }

        .section-subtitle {
            color: var(--text-muted);
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }

        /* Search & Filter */
        .filter-section {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 1rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        input[type="text"] {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.75rem;
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            background: var(--bg-light);
            color: var(--secondary);
            font-size: 0.95rem;
            transition: var(--transition);
            font-family: inherit;
        }

        input[type="text"]:focus {
            outline: none;
            border-color: var(--primary);
            background: var(--white);
            box-shadow: 0 0 0 3px rgba(67, 56, 202, 0.15);
        }

        /* Table Styles */
        .table-responsive {
            overflow-x: auto;
            border-radius: var(--radius-md);
            border: 1px solid var(--border);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
            background: var(--white);
        }

        th, td {
            padding: 1rem 1.25rem;
            font-size: 0.95rem;
        }

        th {
            background: var(--bg-light);
            color: var(--text-muted);
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.8rem;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            border-bottom: 1px solid var(--border);
            color: var(--secondary);
            font-weight: 500;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background: var(--bg-light);
        }

        .timestamp {
            color: var(--text-muted);
            font-family: monospace;
            font-size: 0.9rem;
        }

        /* Status Pills */
        .status {
            display: inline-flex;
            align-items: center;
            padding: 0.25rem 0.75rem;
            border-radius: 2rem;
            font-size: 0.8rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.02em;
        }

        .status.pass, .status.success, .status.approved {
            background: #dcfce7;
            color: #166534;
        }

        .status.fail, .status.error, .status.rejected {
            background: #fee2e2;
            color: #991b1b;
        }

        .status.halt, .status.warning {
            background: #fef3c7;
            color: #92400e;
        }

        .status.info, .status.default {
            background: #e0e7ff;
            color: #3730a3;
        }

        .loading {
            text-align: center;
            padding: 3rem !important;
            color: var(--text-muted);
            font-style: italic;
        }

        /* Notifications */
        #notification-container {
            position: fixed;
            top: 90px;
            right: 20px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 10px;
            pointer-events: none;
        }

        .notification {
            background: var(--white);
            color: var(--secondary);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            box-shadow: var(--shadow-lg);
            border-left: 4px solid var(--primary);
            min-width: 300px;
            display: flex;
            align-items: center;
            gap: 1rem;
            font-size: 0.95rem;
            font-weight: 500;
            pointer-events: auto;
            transform: translateX(120%);
            opacity: 0;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1), opacity 0.3s ease;
        }

        .notification.show { transform: translateX(0); opacity: 1; }
        .notification.error { border-left-color: var(--danger); }
        .notification.success { border-left-color: var(--success); }
    </style>
</head>

<body>

    <div id="notification-container"></div>

    <header class="dashboard-header">
        <a href="#" class="logo">ProAuto Audit Portal</a>
        <div class="header-actions">
            <span class="user-info" id="active-user-display">System Auditor</span>
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <div class="main-layout">
        <div class="dashboard-container">
            
            <h2 class="section-title">Audit Logs</h2>
            <p class="section-subtitle">Immutable record of all system activities, evaluations, and access events.</p>

            <div class="filter-section">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by User ID, Action, or Status..." onkeyup="filterLogs()">
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User ID</th>
                            <th>Action / Status</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody">
                        <tr>
                            <td colspan="3" class="loading">Fetching system logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script>
        // Check for user data in storage and update header
        try {
            const userObj = JSON.parse(localStorage.getItem('user'));
            if (userObj && userObj.name) {
                document.getElementById('active-user-display').textContent = userObj.name;
            }
        } catch (e) { /* default to System Auditor */ }

        // --- Notification System ---
        function showNotification(message, type = 'info') {
            const container = document.getElementById('notification-container');
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.innerHTML = `<span>${message}</span>`;
            
            container.appendChild(notification);
            
            requestAnimationFrame(() => {
                setTimeout(() => notification.classList.add('show'), 10);
            });
            
            setTimeout(() => {
                notification.classList.remove('show');
                setTimeout(() => notification.remove(), 300);
            }, 4000);
        }

        // --- Logout Logic ---
        function handleLogout() {
            if (confirm("Are you sure you want to securely log out?")) {
                localStorage.clear();
                sessionStorage.clear();
                window.location.href = "/";
            }
        }

        // --- Fetch Logs from API ---
        let logs = [];

        async function fetchLogs() {
            try {
                const res = await fetch('/api/auditor/logs', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({})
                });

                if (!res.ok) throw new Error("API Offline");

                const data = await res.json();

                if (data.logs && data.logs.length > 0) {
                    logs = data.logs;
                    renderLogs(logs);
                } else {
                    handleEmptyOrError("No audit logs found.");
                }
            } catch (err) {
                console.error("Log fetch error:", err);
                
                // Fallback Mock Data for UI demonstration
                logs = [
                    { action_timestamp: "2026-04-15 08:30:12", user_id: "USR-001", action_taken: "PASS" },
                    { action_timestamp: "2026-04-15 09:15:44", user_id: "USR-042", action_taken: "FAIL" },
                    { action_timestamp: "2026-04-15 10:05:00", user_id: "USR-011", action_taken: "HALT" },
                    { action_timestamp: "2026-04-15 11:22:30", user_id: "USR-005", action_taken: "LOGIN" },
                    { action_timestamp: "2026-04-15 13:40:10", user_id: "USR-001", action_taken: "LOGOUT" }
                ];
                renderLogs(logs);
                showNotification("Simulated Data: API Offline", "error");
            }
        }

        const tableBody = document.getElementById('auditTableBody');

        function handleEmptyOrError(message) {
            logs = [];
            tableBody.innerHTML = `<tr><td colspan="3" class="loading">${message}</td></tr>`;
        }

        function renderLogs(data) {
            tableBody.innerHTML = "";

            if (data.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="3" class="loading">No matching logs found.</td></tr>`;
                return;
            }

            data.forEach(log => {
                const row = document.createElement('tr');

                // Determine badge color class based on text
                const rawAction = String(log.action_taken || 'INFO');
                const actionLower = rawAction.toLowerCase();
                let statusClass = 'default';

                if (['pass', 'success', 'approved'].includes(actionLower)) statusClass = 'pass';
                else if (['fail', 'error', 'rejected', 'delete'].includes(actionLower)) statusClass = 'fail';
                else if (['halt', 'warning', 'suspend'].includes(actionLower)) statusClass = 'halt';

                row.innerHTML = `
                    <td class="timestamp">${log.action_timestamp}</td>
                    <td><strong>${log.user_id}</strong></td>
                    <td>
                        <span class="status ${statusClass}">
                            ${rawAction}
                        </span>
                    </td>
                `;
                tableBody.appendChild(row);
            });
        }

        function filterLogs() {
            const search = document.getElementById('searchInput').value.toLowerCase().trim();

            if (!search) {
                renderLogs(logs);
                return;
            }

            const filtered = logs.filter(log => {
                const userIdStr = String(log.user_id || '').toLowerCase();
                const actionStr = String(log.action_taken || '').toLowerCase();
                return userIdStr.includes(search) || actionStr.includes(search);
            });

            renderLogs(filtered);
        }

        // Initialize
        fetchLogs();
    </script>
</body>

</html>
