<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>System Audit Logs - </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboards/css/auditor_dashboard.css">
</head>

<body>

    <div id="notification-container"></div>

    <header class="dashboard-header">
        <a href="#" class="logo"> Audit Portal</a>
        <div class="header-actions">
            <span class="user-info" id="active-user-display">System Auditor</span>
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <div class="main-layout">
        <div class="dashboard-container">
            
            <h2 class="section-title">Audit Logs</h2>
            <p class="section-subtitle">Immutable record of all system activities, evaluations, and access events.</p>

            <div class="filter-section">
                <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <circle cx="11" cy="11" r="8"></circle>
                    <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                </svg>
                <input type="text" id="searchInput" placeholder="Search by User ID, Action, or Status..." onkeyup="filterLogs()">
            </div>

            <div class="table-responsive">
                <table>
                    <thead>
                        <tr>
                            <th>Timestamp</th>
                            <th>User ID</th>
                            <th>Action / Status</th>
                        </tr>
                    </thead>
                    <tbody id="auditTableBody">
                        <tr>
                            <td colspan="3" class="loading">Fetching system logs...</td>
                        </tr>
                    </tbody>
                </table>
            </div>

        </div>
    </div>

    <script src="/dashboards/js/auditor_dashboard.js"></script>
</body>

</html>
