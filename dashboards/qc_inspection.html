<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspector Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 40px 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* --- New Layout Container --- */
        .main-layout {
            display: flex;
            flex-direction: column; /* Stacked by default (mobile) */
            gap: 2rem;
            width: 100%;
            max-width: 1000px; /* Increased to fit side-by-side */
            justify-content: center;
            align-items: flex-start;
        }

        /* Dashboard Header stays at the top of the container */
        .dashboard-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #eee;
            width: 100%;
        }

        .dashboard-container, .viewer-card {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            text-align: center;
        }

        /* --- Laptop/Desktop View --- */
        @media (min-width: 850px) {
            .main-layout {
                flex-direction: row; /* Side-by-side */
                align-items: stretch; /* Make both cards same height */
            }
            .dashboard-container, .viewer-card {
                flex: 1; /* Split width 50/50 */
            }
        }

        h2 { margin-bottom: 0.5rem; color: #333; }
        h3 { color: #333; }
        p { color: #666; font-size: 0.9rem; margin-bottom: 1.5rem; }

        input, select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus { border-color: #764ba2; }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover { background: #5a378c; }
        .btn:disabled { background: #a9a9a9; cursor: not-allowed; }

        #image-display-container {
            margin-top: 1.5rem;
            width: 100%;
            min-height: 250px;
            border: 2px dashed #ddd;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }

        #evidence-preview {
            max-width: 100%;
            height: auto;
            display: none;
        }

        .placeholder-text {
            color: #aaa;
            font-size: 0.85rem;
        }

        .logout-btn {
            background: #e53e3e;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
            font-size: 0.85rem;
        }

        .logout-btn:hover { background: #c53030; }
    </style>
</head>

<body>

    <div class="main-layout">
        
        <div class="dashboard-container">
            <div class="dashboard-header">
                <div style="text-align: left;">
                    <h2>QC Portal</h2>
                    <p style="margin-bottom: 0;">Evaluation Form</p>
                </div>
                <button class="logout-btn" onclick="handleLogout()">Logout</button>
            </div>

            <div id="inspector-form" class="form-box">
                <form id="qc-form">
                    <input type="text" id="batch-id" placeholder="Enter Batch ID" required>
                    <input type="text" id="inspector-id" placeholder="Inspector ID" required>
                    <input type="text" id="inspection-id" placeholder="Inspection ID" required>
                    <select id="inspection-status" required>
                        <option value="">-- Pass or Fail --</option>
                        <option value="Pass">Pass</option>
                        <option value="Fail">Fail</option>
                    </select>
                    <select id="defect-type" required>
                        <option value="">-- Select Root Defect --</option>
                        <option value="ss">Surface Scratch</option>
                        <option value="de">Dimensional Error</option>
                        <option value="cm">Component Missing</option>
                        <option value="ce">Calibration Error</option>
                    </select>
                    <input type="file" id="evidence-image" accept="image/*" required>
                    <input type="date" id="inspection-date" required>
                    <button type="submit" class="btn" id="submit-btn">Submit Report</button>
                </form>
            </div>
        </div>

        <div class="viewer-card">
            <h3>Evidence Viewer</h3>
            <input type="text" id="fetch-batch-id" placeholder="Enter Batch ID to search">
            <button class="btn" id="fetch-btn" style="background: #667eea;">Fetch Evidence</button>
            
            <div id="image-display-container">
                <span class="placeholder-text" id="status-text">No image loaded</span>
                <img src="" id="evidence-preview" alt="Batch Evidence">
            </div>
        </div>

    </div>

    <script>

        // --- Logout Logic ---
        function handleLogout() {
            if (confirm("Are you sure you want to logout?")) {
                // Clear local storage
                localStorage.clear();
                sessionStorage.clear();

                // Redirect to login page
                window.location.href = "/";
            }
        }

        // --- Submission Logic ---
        const inspectorForm = document.getElementById('qc-form');
        const submitBtn = document.getElementById('submit-btn');

        inspectorForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            const file = document.getElementById('evidence-image').files;
            if (!file) return alert("Please select an image.");

            try {
                submitBtn.disabled = true;
                submitBtn.textContent = "Processing...";

                // 1. Get S3 URL
                const urlRes = await fetch(`/api/inspector/get_s3_upload_url?filename=${encodeURIComponent(file.name)}&fileType=${encodeURIComponent(file.type)}`);
                const { uploadUrl, publicUrl } = await urlRes.json();

                // 2. Upload to S3
                await fetch(uploadUrl, { method: 'PUT', headers: { 'Content-Type': file.type }, body: file });

                // 3. Save to Supabase (via your inspector.js backend)
                const res = await fetch('/api/inspector/evaluate_batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        batch_id: document.getElementById('batch-id').value,
                        inspector_id: document.getElementById('inspector-id').value,
                        inspection_id: document.getElementById('inspection-id').value,
                        status: document.getElementById('inspection-status').value,
                        defect: document.getElementById('defect-type').value,
                        evidence: publicUrl,
                        inspection_date: document.getElementById('inspection-date').value
                    })
                });

                if (res.ok) {
                    alert('Report Submitted!');
                    inspectorForm.reset();
                }
            } catch (err) {
                alert("Error: " + err.message);
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Quality Report";
            }
        });

        // --- FETCH EVIDENCE LOGIC ---
        const fetchBtn = document.getElementById('fetch-btn');
        const fetchInput = document.getElementById('fetch-batch-id');
        const previewImg = document.getElementById('evidence-preview');
        const statusText = document.getElementById('status-text');

        fetchBtn.addEventListener('click', async () => {
            const batchId = fetchInput.value.trim();
            if (!batchId) return alert("Please enter a Batch ID");

            try {
                fetchBtn.textContent = "Searching...";
                statusText.textContent = "Querying Supabase...";
                previewImg.style.display = "none";

                const response = await fetch(`/api/inspector/get_batch_evidence?batch_id=${batchId}`);
                const data = await response.json();

                if (response.ok && data.evidenceUrl) {
                    previewImg.src = data.evidenceUrl; // The AWS S3 URL from DB
                    previewImg.style.display = "block";
                    statusText.style.display = "none";
                } else {
                    statusText.textContent = "No record found for this ID.";
                    statusText.style.display = "block";
                }
            } catch (err) {
                statusText.textContent = "Error fetching data.";
            } finally {
                fetchBtn.textContent = "Fetch Evidence";
            }
        });
    </script>
</body>

</html>
