<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspector Portal - </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboards/css/qc_inspection.css">
</head>

<body>

    <div id="notification-container"></div>

    <header class="dashboard-header">
        <a href="#" class="logo"> QC Portal</a>
        <div class="header-actions">
            <span class="user-info" id="active-user-display">QC Inspector</span>
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <div class="main-layout">
        
        <div class="dashboard-container">
            <h2 class="section-title">Evaluation Form</h2>
            <p class="section-subtitle">Log new quality control inspection data.</p>

            <div id="inspector-form">
                <form id="qc-form">
                    <div class="input-row">
                        <div class="form-group">
                            <label for="batch-id">Batch ID</label>
                            <input type="text" id="batch-id" required>
                        </div>
                        <div class="form-group">
                            <label for="inspection-id">Inspection ID</label>
                            <input type="text" id="inspection-id" required>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="inspector-id">Inspector ID</label>
                        <input type="text" id="inspector-id" required>
                    </div>
                    
                    <div class="input-row">
                        <div class="form-group">
                            <label for="inspection-status">Overall Status</label>
                            <select id="inspection-status" required>
                                <option value="" disabled selected>-- Pass or Fail --</option>
                                <option value="Pass">Pass</option>
                                <option value="Fail">Fail</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="defect-type">Root Defect (If Fail)</label>
                            <select id="defect-type">
                                <option value="" disabled selected>-- Select Defect --</option>
                                <option value="None">None</option>
                                <option value="Surface Scratch">Surface Scratch</option>
                                <option value="Dimensional Error">Dimensional Error</option>
                                <option value="Component Missing">Component Missing</option>
                                <option value="Calibration Error">Calibration Error</option>
                            </select>
                        </div>
                    </div>

                    <div class="form-group">
                        <label for="evidence-image">Upload Evidence Image</label>
                        <input type="file" id="evidence-image" accept="image/*" required>
                    </div>

                    <div class="form-group">
                        <label for="inspection-date">Inspection Date</label>
                        <input type="date" id="inspection-date" required>
                    </div>

                    <button type="submit" class="btn" id="submit-btn">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
                            <polyline points="22 4 12 14.01 9 11.01"></polyline>
                        </svg>
                        Submit Quality Report
                    </button>
                </form>
            </div>
        </div>

        <div class="viewer-card">
            <h3 class="section-title">Evidence Viewer</h3>
            <p class="section-subtitle">Retrieve images from past inspections.</p>
            
            <div class="search-bar">
                <input type="text" id="fetch-batch-id" placeholder="Enter Batch ID...">
                <button class="btn btn-secondary" id="fetch-btn">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                    Search
                </button>
            </div>
            
            <div id="image-display-container">
                <div class="placeholder-text" id="status-text">
                    <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#cbd5e1" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect>
                        <circle cx="8.5" cy="8.5" r="1.5"></circle>
                        <polyline points="21 15 16 10 5 21"></polyline>
                    </svg>
                    No image loaded
                </div>
                <img src="" id="evidence-preview" alt="Batch Evidence">
            </div>
        </div>

    </div>

    <script src="/dashboards/js/qc_inspection.js"></script>
</body>

</html>
