<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QC Inspector Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .dashboard-container {
            background: #fff;
            padding: 2.5rem;
            border-radius: 12px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.2);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        h2 {
            margin-bottom: 0.5rem;
            color: #333;
        }

        p {
            color: #666;
            font-size: 0.9rem;
            margin-bottom: 1.5rem;
        }

        input,
        select {
            width: 100%;
            padding: 12px;
            margin-bottom: 1rem;
            border: 1px solid #ddd;
            border-radius: 6px;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: #764ba2;
        }

        .btn {
            width: 100%;
            padding: 12px;
            background: #764ba2;
            color: white;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: 0.3s;
        }

        .btn:hover {
            background: #5a378c;
        }
        
        .btn:disabled {
            background: #a9a9a9;
            cursor: not-allowed;
        }

        .toggle-text {
            margin-top: 1rem;
        }

        .toggle-text span {
            color: #764ba2;
            cursor: pointer;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }
    </style>
</head>

<body>
    <div class="dashboard-container">
        <div id="inspector-form" class="form-box">
            <h2>QC Inspector Portal</h2>
            <p>Evaluate production batches</p>
            <form action="/" method="POST">
                <input type="text" name="batch_id" id="batch-id" placeholder="Enter defective Batch ID" required>
                <input type="text" name="inspector_id" id="inspector-id" placeholder="Enter Inspector ID" required>
                <input type="text" name="inspection_id" id="inspection-id" placeholder="Enter Inspection ID" required>
                <select id="inspection-status" required>
                    <option value="">-- Pass or Fail --</option>
                    <option value="Pass">Pass</option>
                    <option value="Fail">Fail</option>
                </select>
                <select id="defect-type" required>
                    <option value="">-- Select Root Defect --</option>
                    <option value="ss">Surface Scratch</option>
                    <option value="de">Dimensional Error</option>
                    <option value="cm">Component Missing</option>
                    <option value="ce">Calibration Error</option>
                </select>
                <input type="file" id="evidence-image" name="evidence_image" accept="image/*" required>
                <input type="date" name="inspection_date" id="inspection-date" placeholder="Inspection Date" required>
                <button type="submit" class="btn" id="submit-btn">Submit Quality Report</button>
            </form>

        </div>

    </div>

    <script>
        // inspector form submission handler
        const inspectorForm = document.querySelector('#inspector-form form');
        const submitBtn = document.getElementById('submit-btn');

        inspectorForm.addEventListener('submit', async function (e) {
            e.preventDefault();
            
            // Gather text inputs
            const batch_id = document.getElementById('batch-id').value;
            const inspector_id = document.getElementById('inspector-id').value;
            const inspection_id = document.getElementById('inspection-id').value;
            const status = document.getElementById('inspection-status').value; 
            const defect = document.getElementById('defect-type').value; 
            const inspection_date = document.getElementById('inspection-date').value;
            
            // Gather the file
            const file = document.getElementById('evidence-image').files[0];

            if (!file) {
                alert("Please select an evidence image.");
                return;
            }

            try {
                // Update UI to show loading state
                submitBtn.disabled = true;
                submitBtn.textContent = "Uploading Image to S3...";

                // STEP 1: Get the secure S3 upload ticket from your backend
                // Note: I assumed your routes are prefixed with /api/inspector based on your fetch URL
                const urlRes = await fetch(`/api/inspector/get_s3_upload_url?filename=${encodeURIComponent(file.name)}&fileType=${encodeURIComponent(file.type)}`);
                
                if (!urlRes.ok) throw new Error("Could not get S3 upload link from server.");
                const { uploadUrl, publicUrl } = await urlRes.json();

                // STEP 2: Upload directly to AWS S3
                const s3Res = await fetch(uploadUrl, {
                    method: 'PUT',
                    headers: { 'Content-Type': file.type },
                    body: file
                });

                if (!s3Res.ok) throw new Error("Failed to upload image to S3.");

                // Update UI again
                submitBtn.textContent = "Saving to Database...";

                // STEP 3: Send text data AND the permanent S3 URL to your backend
                const res = await fetch('/api/inspector/evaluate_batch', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ 
                        batch_id, 
                        inspector_id, 
                        inspection_id, 
                        status,       // Matched with backend req.body
                        defect,       // Matched with backend req.body
                        evidence: publicUrl, // Passing the S3 URL string!
                        inspection_date 
                    })
                });

                const data = await res.json();
                
                if (res.ok) {
                    alert(data.message || 'QC inspection successfully completed!');
                    inspectorForm.reset(); // Clear the form on success
                } else {
                    throw new Error(data.message || 'QC inspection failed');
                }
                
            } catch (err) {
                console.error(err);
                alert("An error occurred: " + err.message);
            } finally {
                // Reset the button back to normal
                submitBtn.disabled = false;
                submitBtn.textContent = "Submit Quality Report";
            }
        });
    </script>
</body>

</html>
