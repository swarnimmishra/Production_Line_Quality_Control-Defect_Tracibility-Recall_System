<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Operator Portal - </title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/dashboards/css/operator_entry.css">
</head>

<body>

    <div id="notification-container"></div>

    <header class="dashboard-header">
        <a href="#" class="logo"> Operator Portal</a>
        <div class="header-actions">
            <span class="user-info" id="active-user-display">Line Operator</span>
            <button class="logout-btn" onclick="handleLogout()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                    <polyline points="16 17 21 12 16 7"></polyline>
                    <line x1="21" y1="12" x2="9" y2="12"></line>
                </svg>
                Logout
            </button>
        </div>
    </header>

    <div class="dashboard-container">

        <div class="form-header">
            <h2>Log Production Run</h2>
            <p>Enter batch details below</p>
        </div>

        <div id="operator-form">
            <form id="production-form">

                <div class="input-row">
                    <div class="form-group">
                        <label for="operator-id">Operator ID</label>
                        <input type="text" name="operator_id" id="operator-id" required>
                    </div>
                    <div class="form-group">
                        <label for="batch-id">Batch ID</label>
                        <input type="text" name="batch_id" id="batch-id" required>
                    </div>

                    <div class="form-group">
                        <label for="product-id">Product ID</label>
                        <input type="text" name="product_id" id="product-id" required>
                    </div>
                    <div class="form-group">
                        <label for="machine-id">Machine ID</label>
                        <input type="text" name="machine_id" id="machine-id" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="shift">Operating Shift</label>
                    <select id="shift" name="shift" required>
                        <option value="" disabled selected>-- Select Shift --</option>
                        <option value="Morning">Morning (06:00 - 14:00)</option>
                        <option value="Evening">Evening (14:00 - 22:00)</option>
                        <option value="Night">Night (22:00 - 06:00)</option>
                    </select>
                </div>

                <div class="input-row">
                    <div class="form-group">
                        <label for="quantity">Quantity Produced</label>
                        <input type="number" name="quantity" id="quantity" placeholder="0" min="1" required>
                    </div>
                    <div class="form-group">
                        <label for="production-date">Production Date</label>
                        <input type="date" name="production_date" id="production-date" required>
                    </div>
                </div>

                <button type="submit" class="btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                        stroke-linecap="round" stroke-linejoin="round">
                        <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                        <polyline points="17 21 17 13 7 13 7 21"></polyline>
                        <polyline points="7 3 7 8 15 8"></polyline>
                    </svg>
                    Log Production Batch
                </button>
            </form>
        </div>

    </div>

    <script src="/dashboards/js/operator_entry.js"></script>
</body>

</html>
